<main>
    
    <section class="Newsletter">

        <h1>Commit Thy Name to the Stars</h1>

        <p>Register for our newsletter to receive updates on all things Elden Ring.</p>

        <form action="#" method="post">

            <fieldset>

                <legend>Tarnished Identity</legend>
                <label for="Username">Username:</label>
                <input type="text" id="Username" placeholder="i.e. Ranni" required>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="i.e. Ranni@magic.com" required>

            </fieldset>

            <fieldset>

                <legend>Choose Your Destiny</legend>
                <label for="Class">Starting Class:</label>
                <select>
                    <option value="Vagabond">Vagabond</option>
                    <option value="Hero">Hero</option>
                    <option value="Warrior">Warrior</option>
                    <option value="Prisoner">Prisoner</option>
                    <option value="Bandit">Bandit</option>
                    <option value="Astrologer">Astrologer</option>
                    <option value="Confessor">Confessor</option>
                    <option value="Samurai">Samurai</option>
                    <option value="Prophet">Prophet</option>
                    <option value="Wretch">Wretch</option>
                </select>

                <p>Select Your Combat Style:</p>
                <label><input type="radio" name="combatStyle" value="melee">Melee</label>
                <label><input type="radio" name="combatStyle" value="magic">Magic (Sorcery/Incantations)</label>
                <label><input type="radio" name="combatStyle" value="hybrid">Hybrid (Melee/Magic)</label>

            </fieldset>

            <fieldset>

                <legend>Mark Your Journey</legend>
                <p>Explored Regions:</p>
                <label><input type="checkbox" name="region" value="limgrave">Limgrave</label>
                <label><input type="checkbox" name="region" value="liurnia">Liurnia of the Lakes</label>
                <label><input type="checkbox" name="region" value="caelid">Caelid</label>
                <label><input type="checkbox" name="region" value="altus plateau">Altus Plateau</label>
                <label><input type="checkbox" name="region" value="mountaintops giants">Mountaintops of the Giants</label>
                <label><input type="checkbox" name="region" value="leyndell">Leyndell, Royal Capital</label>
                <label><input type="checkbox" name="region" value="consecrated snowfield">Consecrated Snowfield</label>
                <label><input type="checkbox" name="region" value="haligtree">Miquella's Haligtree</label>
                <label><input type="checkbox" name="region" value="crumbling farum azula">Crumbling Farum Azula</label>

                <label for="journey">Recall your time in the Lands Between:</label>
                <textarea id="journey" name="journey" rows="6" placeholder="Recount your journey here..."></textarea>

            </fieldset>

            <button type="submit" class="submitButton">Become A Legend</button>

        </form>

    </section>
